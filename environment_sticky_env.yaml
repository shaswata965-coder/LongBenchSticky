name: sticky_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch>=2.1.0
  - torchvision
  - torchaudio
  - pytorch-cuda=12.4
  - numpy
  - tqdm
  - pip
  - pyarrow
  - pip:
    - transformers==4.35.2
    - datasets
    - accelerate
    - sentencepiece
    - protobuf
    - matplotlib
    - seaborn
